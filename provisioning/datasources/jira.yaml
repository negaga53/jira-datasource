apiVersion: 1

datasources:
  - name: Jira
    type: jira-datasource
    access: proxy
    isDefault: false
    jsonData:
      url: ${JIRA_URL}
      authType: basic
      username: ${JIRA_USERNAME}
      apiVersion: "2"
      cacheTTLSeconds: 300
    secureJsonData:
      apiToken: ${JIRA_API_TOKEN}

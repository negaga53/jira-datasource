name: CI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm run test -- --ci

      - name: Test backend
        run: go test -v ./pkg/...

      - name: Build backend (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/gpx_jira-datasource_linux_amd64 ./pkg

      - name: Package plugin
        run: |
          cd dist
          zip -r ../jira-datasource-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: jira-datasource-${{ github.ref_name }}.zip
          generate_release_notes: true
